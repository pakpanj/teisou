name: kana_master
description: "Teisou: Kana Master - belajar Hiragana & Katakana untuk pemula."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.5
  google_sign_in: ^6.2.2

  # Avatar upload: pick from gallery (built-in resize/compress via
  # maxWidth/maxHeight/imageQuality — no separate compression package)
  image_picker: ^1.1.2

  # Text-to-speech untuk pengucapan kana & contoh kata
  flutter_tts: ^4.2.0

  # Render aset karakter kana berbentuk SVG
  flutter_svg: ^2.0.16
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.3.0
  confetti: ^0.8.0

  # Cam Detector: live camera preview + offline Japanese OCR
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.16.0
  permission_handler: ^12.0.3

  # Local storage untuk Daftar Belajar (saved words) sebelum sync ke Firestore
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/kana_data.json
    - assets/data/kanji_data.json
    - assets/data/kotoba_data.json
    - assets/data/kotoba/
    - assets/svg/hiragana/
    - assets/svg/katakana/
    - assets/images/
